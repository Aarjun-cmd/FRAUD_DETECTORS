<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FraudGuard AI — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --red: #E8341A;
      --red-dim: #C42C15;
      --red-glow: rgba(232, 52, 26, 0.18);
      --red-faint: rgba(232, 52, 26, 0.07);
      --amber: #F0A500;
      --green: #22C55E;
      --bg-base: #0A0A0B;
      --bg-surface: #111113;
      --bg-raised: #18181B;
      --bg-hover: #1E1E22;
      --border: rgba(255,255,255,0.07);
      --border-mid: rgba(255,255,255,0.12);
      --border-strong: rgba(255,255,255,0.22);
      --text-primary: #F4F4F5;
      --text-secondary: #A1A1AA;
      --text-muted: #52525B;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Top red line accent */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
      z-index: 100;
    }

    /* Animated grid background */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
      animation: gridPan 30s linear infinite;
    }

    @keyframes gridPan {
      from { background-position: 0 0; }
      to { background-position: 40px 40px; }
    }

    /* Red glow orb behind card */
    .bg-orb {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,52,26,0.12) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      animation: orbPulse 6s ease-in-out infinite;
    }

    @keyframes orbPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      50% { transform: translate(-50%, -50%) scale(1.12); opacity: 0.7; }
    }

    /* Container */
    .login-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 1.5rem;
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Card */
    .card {
      background: var(--bg-surface);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-lg);
      padding: 2.5rem 2rem;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.5),
        0 32px 64px rgba(0,0,0,0.5),
        0 0 80px var(--red-glow);
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2rem;
    }

    .logo-mark {
      width: 36px; height: 36px;
      background: var(--red);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 20px var(--red-glow);
    }

    .logo-mark svg { width: 20px; height: 20px; }

    .logo-text {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .logo-text span { color: var(--red); }

    /* Heading */
    .heading {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.35rem;
    }

    .subheading {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 1.75rem;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 4px;
      margin-bottom: 1.75rem;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      padding: 7px 0;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab-btn.active {
      background: var(--bg-hover);
      color: var(--text-primary);
      border: 1px solid var(--border-mid);
    }

    /* Form group */
    .form-group {
      margin-bottom: 1rem;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--text-secondary);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px; height: 16px;
      color: var(--text-muted);
      pointer-events: none;
      transition: color 0.2s;
    }

    .form-input {
      width: 100%;
      background: var(--bg-raised);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 10px 12px 10px 38px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px var(--red-faint);
    }

    .form-input:focus + svg,
    .input-wrap:focus-within svg {
      color: var(--red);
    }

    /* reorder icon so it shows on top */
    .input-wrap svg { z-index: 1; }
    .form-input { position: relative; z-index: 0; }

    .form-input::placeholder { color: var(--text-muted); }

    /* Show/hide password toggle */
    .pw-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.2s;
      z-index: 2;
    }
    .pw-toggle:hover { color: var(--text-secondary); }
    .pw-toggle svg { width: 16px; height: 16px; }

    /* Forgot password */
    .forgot {
      display: block;
      text-align: right;
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      margin-top: 6px;
      transition: color 0.2s;
    }
    .forgot:hover { color: var(--red); }

    /* Submit button */
    .btn-submit {
      width: 100%;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.01em;
      padding: 11px 0;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }

    .btn-submit:hover:not(:disabled) {
      background: var(--red-dim);
      box-shadow: 0 0 28px var(--red-glow);
    }

    .btn-submit:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-submit .btn-inner {
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    /* Spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-label { display: none; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.25rem 0;
      color: var(--text-muted);
      font-size: 12px;
      font-family: var(--font-mono);
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* OAuth button */
    .btn-oauth {
      width: 100%;
      background: var(--bg-raised);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      padding: 10px 0;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .btn-oauth:hover {
      border-color: var(--border-strong);
      color: var(--text-primary);
      background: var(--bg-hover);
    }
    .btn-oauth svg { width: 18px; height: 18px; }

    /* Alert / message */
    .alert {
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 1rem;
      display: none;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    .alert.show { display: flex; align-items: flex-start; gap: 8px; }
    .alert.error { background: rgba(232,52,26,0.1); border: 1px solid rgba(232,52,26,0.25); color: #f87171; }
    .alert.success { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2); color: #4ade80; }
    .alert.info { background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2); color: #60a5fa; }
    .alert svg { width: 15px; height: 15px; flex-shrink: 0; margin-top: 1px; }

    /* Footer note */
    .footer-note {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1.5rem;
      font-family: var(--font-mono);
    }

    /* Signup fields hidden initially */
    #signup-fields { display: none; }

    /* Requirement hints for signup */
    .hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      font-family: var(--font-mono);
    }

    /* Verified badge shown after email confirmation */
    .verified-badge {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
      padding: 1.5rem 0 0.5rem;
    }
    .verified-badge.show { display: flex; }
    .badge-icon {
      width: 56px; height: 56px;
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.25);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .badge-icon svg { width: 28px; height: 28px; color: #4ade80; }
    .verified-badge h3 {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 700;
    }
    .verified-badge p { font-size: 13px; color: var(--text-secondary); max-width: 280px; }

    /* Input icon fix - put icon inside correctly */
    .input-icon-wrap {
      position: relative;
    }
    .input-icon-wrap .icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 15px; height: 15px;
      color: var(--text-muted);
      pointer-events: none;
      transition: color 0.2s;
      z-index: 2;
    }
    .input-icon-wrap:focus-within .icon {
      color: var(--red);
    }
    .input-icon-wrap input {
      padding-left: 36px;
    }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-orb"></div>

<div class="login-wrap">
  <div class="card">

    <!-- Logo -->
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 18 18" fill="none">
          <path d="M9 1.5L2.25 5.25V9.75C2.25 13.41 5.19 16.815 9 17.625C12.81 16.815 15.75 13.41 15.75 9.75V5.25L9 1.5Z" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="1.2"/>
          <path d="M6 9L8 11L12 7" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="logo-text">Fraud<span>Guard</span> AI</div>
    </div>

    <!-- Heading -->
    <div class="heading">Access the system</div>
    <div class="subheading">Sign in to continue to the Negotiator Agent dashboard.</div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- Alert box -->
    <div class="alert error" id="alert-box">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="alert-msg">Something went wrong.</span>
    </div>

    <!-- Email verification success state -->
    <div class="verified-badge" id="verified-state">
      <div class="badge-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h3>Check your email</h3>
      <p>We sent a confirmation link to your email. Click it to activate your account, then sign in.</p>
      <button class="btn-submit" style="margin-top:0.5rem" onclick="switchTab('login')">
        <div class="btn-inner"><span class="btn-label">Back to Sign In</span></div>
      </button>
    </div>

    <!-- Form -->
    <form id="auth-form" onsubmit="handleSubmit(event)" autocomplete="on">

      <!-- Signup-only: Full name -->
      <div id="signup-fields">
        <div class="form-group">
          <label class="form-label" for="fullname">FULL NAME</label>
          <div class="input-icon-wrap">
            <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input class="form-input" type="text" id="fullname" placeholder="Jane Doe" autocomplete="name" />
          </div>
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label" for="email">EMAIL ADDRESS</label>
        <div class="input-icon-wrap">
          <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label" for="password">PASSWORD</label>
        <div class="input-icon-wrap" style="position:relative">
          <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
          <button type="button" class="pw-toggle" onclick="togglePassword()" id="pw-eye" title="Show/hide password">
            <svg id="eye-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="hint" id="pw-hint" style="display:none">Min 8 characters.</div>
        <a class="forgot" href="#" id="forgot-link" onclick="handleForgot(event)">Forgot password?</a>
      </div>

      <!-- Submit -->
      <button class="btn-submit" type="submit" id="submit-btn">
        <div class="btn-inner">
          <div class="spinner"></div>
          <span class="btn-label" id="submit-label">Sign In</span>
        </div>
      </button>

    </form>

    <!-- Divider + OAuth -->
    <div class="divider">or</div>
    <button class="btn-oauth" type="button" onclick="handleGoogle()">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <!-- Footer -->
    <div class="footer-note">
      FraudGuard AI · Secure Access · v1.0
    </div>

  </div>
</div>

<script>
  // ── Supabase Init ──────────────────────────────────────
  // REPLACE THESE with your actual values from supabase.com → Settings → API
  const SUPABASE_URL = 'https://meazqxihvgfwqlqordfc.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1lYXpxeGlodmdmd3FscW9yZGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MTA0NDYsImV4cCI6MjA5MTk4NjQ0Nn0.YlUnwKvNjHGe_0CKrSBbnR3FTx_YeLvtVcMZdfoow-U'

  const { createClient } = supabase
  const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  // ── State ──────────────────────────────────────────────
  let currentTab = 'login'

  // ── Tab switcher ───────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab
    hideAlert()
    document.getElementById('verified-state').classList.remove('show')
    document.getElementById('auth-form').style.display = 'block'

    document.getElementById('tab-login').classList.toggle('active', tab === 'login')
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup')
    document.getElementById('signup-fields').style.display = tab === 'signup' ? 'block' : 'none'
    document.getElementById('submit-label').textContent = tab === 'login' ? 'Sign In' : 'Create Account'
    document.getElementById('pw-hint').style.display = tab === 'signup' ? 'block' : 'none'
    document.getElementById('forgot-link').style.display = tab === 'login' ? 'block' : 'none'

    const pwInput = document.getElementById('password')
    pwInput.autocomplete = tab === 'login' ? 'current-password' : 'new-password'
  }

  // ── Password visibility toggle ─────────────────────────
  function togglePassword() {
    const input = document.getElementById('password')
    const icon = document.getElementById('eye-icon')
    if (input.type === 'password') {
      input.type = 'text'
      icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
    } else {
      input.type = 'password'
      icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`
    }
  }

  // ── Alert helpers ──────────────────────────────────────
  function showAlert(msg, type = 'error') {
    const box = document.getElementById('alert-box')
    const msgEl = document.getElementById('alert-msg')
    box.className = `alert ${type} show`
    msgEl.textContent = msg
  }

  function hideAlert() {
    document.getElementById('alert-box').classList.remove('show')
  }

  // ── Loading state ──────────────────────────────────────
  function setLoading(on) {
    const btn = document.getElementById('submit-btn')
    btn.disabled = on
    btn.classList.toggle('loading', on)
  }

  // ── Form submit ────────────────────────────────────────
  async function handleSubmit(e) {
    e.preventDefault()
    hideAlert()

    const email = document.getElementById('email').value.trim()
    const password = document.getElementById('password').value

    if (!email || !password) {
      showAlert('Please fill in all fields.')
      return
    }

    if (currentTab === 'signup' && password.length < 8) {
      showAlert('Password must be at least 8 characters.')
      return
    }

    setLoading(true)

    try {
      if (currentTab === 'login') {
        // ── Sign In ──
        const { data, error } = await client.auth.signInWithPassword({ email, password })
        if (error) throw error

        // Success! Redirect to main app
        showAlert('Signed in! Redirecting…', 'success')
        setTimeout(() => {
          window.location.href = '/index.html'
        }, 1000)

      } else {
        // ── Sign Up ──
        const fullName = document.getElementById('fullname').value.trim()
        const { data, error } = await client.auth.signUp({
          email,
          password,
          options: {
            data: { full_name: fullName }
          }
        })
        if (error) throw error

        // Show email verification message
        document.getElementById('auth-form').style.display = 'none'
        document.getElementById('verified-state').classList.add('show')
      }
    } catch (err) {
      showAlert(err.message || 'Authentication failed.')
    } finally {
      setLoading(false)
    }
  }

  // ── Forgot password ────────────────────────────────────
  async function handleForgot(e) {
    e.preventDefault()
    hideAlert()
    const email = document.getElementById('email').value.trim()
    if (!email) {
      showAlert('Enter your email above, then click Forgot password.')
      return
    }
    setLoading(true)
    try {
      const { error } = await client.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/login.html'
      })
      if (error) throw error
      showAlert('Password reset link sent — check your inbox.', 'info')
    } catch (err) {
      showAlert(err.message || 'Could not send reset email.')
    } finally {
      setLoading(false)
    }
  }

  // ── Google OAuth ───────────────────────────────────────
  async function handleGoogle() {
    hideAlert()
    const { error } = await client.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/index.html' }
    })
    if (error) showAlert(error.message)
  }

  // ── Check if already logged in ─────────────────────────
  ;(async () => {
    const { data: { session } } = await client.auth.getSession()
    if (session) {
      window.location.href = '/index.html'
    }
  })()
</script>

</body>
</html>
